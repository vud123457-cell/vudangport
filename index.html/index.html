<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vu Dang | Ultimate Bio Link 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,700;1,400&family=Space+Mono&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --font-heading: 'Playfair Display', serif; 
            --font-body: 'Lora', serif; 
            --font-mono: 'Space Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        html { scroll-behavior: smooth; }
        body { background: #000; color: white; font-family: var(--font-body); overflow-x: hidden; margin: 0; cursor: none; }

        /* Custom Cursor */
        #custom-cursor {
            width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,0.8); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background 0.3s; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .cursor-hover { width: 50px !important; height: 50px !important; background: rgba(255, 255, 255, 0.1); border-color: #fff; }

        /* Volume UI */
        .volume-ctrl {
            position: fixed; top: 30px; left: 30px; z-index: 1000; display: flex; gap: 15px;
            background: rgba(10, 10, 10, 0.5); backdrop-filter: blur(10px); padding: 10px 18px;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); opacity: 0; transition: 1s;
        }
        .vol-btn { transition: 0.3s; color: #888; cursor: none; }
        .vol-btn:hover { color: #fff; }

        /* Video Background */
        #video-bg {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%); object-fit: cover;
            filter: brightness(0.25) contrast(1.1); opacity: 0; transition: opacity 0.8s;
        }

        /* --- FIX LỖI LAYOUT MÀN HÌNH GỌI --- */
        #phone-overlay {
            position: fixed; inset: 0; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 80px 0; z-index: 9999;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.8s;
        }
        .caller-avatar {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid rgba(34, 197, 94, 0.2);
            object-fit: cover; padding: 5px;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .btn-call {
            width: 75px; height: 75px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; transition: 0.3s; color: white;
        }
        .btn-accept { background: #22c55e; animation: shake 0.6s infinite; }
        .btn-decline { background: #ef4444; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }

        /* --- SECTION 1: HERO & 3D TILT --- */
        .hero-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        .main-card {
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(40px); border-radius: 35px;
            padding: 45px; text-align: center; width: 380px; border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative; opacity: 0; transform: translateY(30px); transition: all 1s ease;
            overflow: hidden; transform-style: preserve-3d;
        }
        .card-inner-glow {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            opacity: 0; transition: 0.4s;
        }
        .main-card:hover .card-inner-glow { opacity: 1; }
        .show-card { opacity: 1 !important; transform: translateY(0); }

        .link-btn-neon {
            font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
            color: #fff; background: rgba(0, 0, 0, 0.4); border: 1px solid #fff;
            border-radius: 12px; padding: 14px; display: block; width: 100%; margin-bottom: 12px; transition: 0.3s;
        }
        .link-btn-neon:hover { color: #000; background: #fff; box-shadow: 0 0 30px #fff; }

        /* --- SECTION 2: BIOGRAPHY --- */
        .about-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px; opacity: 0; transform: translateY(50px); transition: 1.5s; }
        .about-section.visible { opacity: 1; transform: translateY(0); }
        .typing-box { max-width: 950px; width: 100%; background: rgba(255, 255, 255, 0.02); padding: 60px; border-radius: 40px; border-left: 2px solid #fff; }
        .bio-header { display: flex; justify-content: space-between; align-items: center; gap: 40px; margin-bottom: 50px; flex-wrap: wrap; }

        /* --- 3D SLIDER --- */
        .slider-wrapper { position: relative; width: 350px; height: 220px; perspective: 1200px; }
        .slide {
            position: absolute; inset: 0; opacity: 0; object-fit: cover; width: 100%; height: 100%; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .slide.active { opacity: 1; z-index: 2; transform: translateZ(0) rotateY(0deg); }
        .slide.next { opacity: 0; transform: translateZ(-150px) rotateY(45deg) translateX(50%); }
        .slide.prev { opacity: 0; transform: translateZ(-150px) rotateY(-45deg) translateX(-50%); }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(0,0,0,0.6);
            color: white; border: 1px solid rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .slider-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        .lang-toggle { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 5px; cursor: none; transition: 0.3s; display: inline-block; margin-top: 10px; }
        .lang-toggle:hover { background: #fff; color: #000; }

        /* Music Bars */
        .sound-bar { width: 3px; background: #fff; border-radius: 10px; }
        .playing .sound-bar { animation: bar-dance 1s infinite alternate; }
        @keyframes bar-dance { from { height: 5px; } to { height: 20px; } }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="volume-ctrl interactive" id="volume-ui">
        <button class="vol-btn" onclick="adjustVolume(-0.1)"><i class="fas fa-minus"></i></button>
        <i class="fas fa-volume-up text-[10px] opacity-30"></i>
        <button class="vol-btn" onclick="adjustVolume(0.1)"><i class="fas fa-plus"></i></button>
    </div>

    <div id="phone-overlay">
        <div class="flex flex-col items-center">
            <img src="mixi.jpg" class="caller-avatar mb-6" alt="Mixi">
            <h1 style="font-family: var(--font-sans); font-weight: 300;" class="text-4xl tracking-wide mb-2">Anh Tày</h1>
            <p class="text-green-500 tracking-[0.2em] text-[10px] uppercase font-bold animate-pulse">Incoming call...</p>
        </div>

        <div class="flex justify-around w-full max-w-sm">
            <div class="text-center">
                <div class="btn-call btn-decline mb-3 interactive"><i class="fas fa-phone-slash"></i></div>
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Decline</span>
            </div>
            <div class="text-center" onclick="acceptCall()">
                <div class="btn-call btn-accept mb-3 interactive"><i class="fas fa-phone"></i></div>
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Accept</span>
            </div>
        </div>
    </div>

    <video id="video-bg" loop muted playsinline><source id="video-source" src="background1.mp4" type="video/mp4"></video>

    <section class="hero-section">
        <div id="card-wrap" class="main-card">
            <div class="card-inner-glow"></div>
            <div class="relative z-10">
                <img src="profile.jpg" class="w-24 h-24 rounded-full mx-auto mb-6 border border-white/20">
                <h1 style="font-family: var(--font-heading);" class="text-4xl font-bold mb-1 uppercase tracking-tighter">VU DANG</h1>
                <p style="font-family: var(--font-mono);" class="text-[9px] tracking-[6px] text-gray-500 mb-10 uppercase italic">Digital Archive</p>

                <div class="space-y-3 mb-12">
                    <a href="https://www.instagram.com/skibidi171_/" class="link-btn-neon interactive">Instagram</a>
                    <a href="https://discord.com/channels/1479873165172670574/1479873166124781671" class="link-btn-neon interactive">Discord</a>
                    <button onclick="document.getElementById('about-section').scrollIntoView()" class="link-btn-neon bg-white/5 interactive">The Biography</button>
                </div>

                <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                    <div class="flex items-center gap-4 mb-5 text-left">
                        <div id="visualizer" class="flex gap-1 items-end h-5">
                            <div class="sound-bar h-2"></div><div class="sound-bar h-4"></div><div class="sound-bar h-3"></div>
                        </div>
                        <div class="overflow-hidden font-mono text-gray-400">
                            <p class="text-[8px] text-green-400 font-bold uppercase tracking-[3px]">Streaming</p>
                            <h3 id="song-title" class="text-[10px] font-bold italic truncate w-32 uppercase">sound1.mp3</h3>
                        </div>
                    </div>
                    <div class="flex justify-center items-center gap-10">
                        <button onclick="changeTrack(-1)" class="interactive text-gray-500 hover:text-white"><i class="fas fa-backward-step"></i></button>
                        <button onclick="togglePlay()" id="play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center interactive shadow-lg shadow-white/10">
                            <i class="fas fa-play ml-0.5"></i>
                        </button>
                        <button onclick="changeTrack(1)" class="interactive text-gray-500 hover:text-white"><i class="fas fa-forward-step"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="about-section" class="about-section">
        <div class="typing-box">
            <div class="bio-header">
                <div>
                    <h2 style="font-family: var(--font-heading);" class="text-6xl italic">The Biography.</h2>
                    <div class="lang-toggle interactive" id="lang-btn" onclick="toggleLanguage()">TRANSLATE</div>
                </div>
                <div class="slider-wrapper">
                    <button class="slider-btn left-[-20px] interactive" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                    <img src="album1.jpg" class="slide active">
                    <img src="album2.jpg" class="slide next">
                    <img src="album3.jpg" class="slide prev">
                    <button class="slider-btn right-[-20px] interactive" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="text-xl leading-relaxed text-gray-400 font-light" style="white-space: pre-wrap; word-wrap: break-word; text-align: left;">
                <span id="typewriter"></span><span class="cursor-blink border-l-2 ml-1 border-white"></span>
            </div>
        </div>
    </section>

    <audio id="intro-audio" src="introsound.mp3"></audio>
    <audio id="main-audio" loop></audio>

    <script>
        const bios = {
            vi: "Xin chào, tôi là Vũ. Một người đam mê lập trình. Đây là không gian riêng của tôi, nơi tôi lưu trữ những dự án cá nhân và những khoảnh khắc đáng nhớ. Chào mừng bạn đã truy cập thành công vào hệ thống bảo mật của tôi.",
            en: "Hello, I am Vu. A passionate developer. This is my personal space where I archive my projects and memorable moments. Welcome to my secure digital profile."
        };

        const playlist = [
            { title: "Dạo này", audio: "sound1.mp3", video: "background1.mp4" },
            { title: "Bình yên", audio: "sound2.mp3", video: "background1.mp4" }
        ];

        let currentIndex = 0, slideIndex = 0, isTyping = false, currentLang = 'vi', typeInterval;
        const mainAudio = document.getElementById('main-audio'), video = document.getElementById('video-bg'), cursor = document.getElementById('custom-cursor');

        // Mouse Tracker
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
            const card = document.querySelector('.main-card');
            if (card.style.opacity === "1") {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                card.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                // Tilt
                const x = (e.clientX - rect.left - rect.width / 2) / 15;
                const y = (e.clientY - rect.top - rect.height / 2) / 15;
                card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            }
        });

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
        });

        function adjustVolume(val) { let n = mainAudio.volume + val; if(n>=0 && n<=1) mainAudio.volume = n; }
        
        function toggleLanguage() {
            currentLang = (currentLang === 'vi') ? 'en' : 'vi';
            document.getElementById('lang-btn').innerText = (currentLang === 'vi') ? "TRANSLATE" : "DỊCH";
            document.getElementById('typewriter').innerText = "";
            clearInterval(typeInterval); startTyping(bios[currentLang]);
        }

        function startTyping(text) {
            let i = 0;
            typeInterval = setInterval(() => {
                document.getElementById('typewriter').innerText += text[i]; i++;
                if (i >= text.length) clearInterval(typeInterval);
            }, 40);
        }

        function acceptCall() {
            document.getElementById('intro-audio').play();
            document.getElementById('phone-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('phone-overlay').style.display = 'none';
                document.getElementById('card-wrap').classList.add('show-card');
                video.style.opacity = '1'; document.getElementById('volume-ui').style.opacity = '1';
                loadTrack(0);
            }, 800);
        }

        function loadTrack(idx) {
            video.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('song-title').innerText = playlist[idx].title;
                mainAudio.src = playlist[idx].audio;
                document.getElementById('video-source').src = playlist[idx].video;
                video.load(); video.oncanplay = () => { video.play(); video.style.opacity = '1'; };
                mainAudio.play(); updateUI();
            }, 800);
        }

        function changeTrack(dir) { currentIndex = (currentIndex + dir + playlist.length) % playlist.length; loadTrack(currentIndex); }
        
        function moveSlide(n) {
            const slides = document.querySelectorAll('.slide'); const len = slides.length;
            slides[slideIndex].className = 'slide next';
            slideIndex = (slideIndex + n + len) % len;
            slides[slideIndex].className = 'slide active';
            slides[(slideIndex + 1) % len].className = 'slide next';
            slides[(slideIndex - 1 + len) % len].className = 'slide prev';
        }

        function togglePlay() { mainAudio.paused ? (mainAudio.play(), video.play()) : (mainAudio.pause(), video.pause()); updateUI(); }
        
        function updateUI() {
            document.getElementById('play-btn').innerHTML = mainAudio.paused ? '<i class="fas fa-play ml-0.5"></i>' : '<i class="fas fa-pause"></i>';
            document.getElementById('visualizer').className = mainAudio.paused ? 'flex gap-1 items-end h-5' : 'flex gap-1 items-end h-5 playing';
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !isTyping) { isTyping = true; entry.target.classList.add('visible'); startTyping(bios[currentLang]); }
            });
        }, { threshold: 0.3 });
        observer.observe(document.getElementById('about-section'));
    </script>
</body>
</html>
